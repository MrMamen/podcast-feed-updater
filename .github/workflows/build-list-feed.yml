name: Build Tiltcast List Feed

on:
  # Manual trigger only — run after updating the Podchaser list. Keeps Podchaser
  # query points from being spent on every push.
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    # Grant write permissions for GitHub Pages deployment
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Build Tiltcast list feeds
      env:
        PODCHASER_API_KEY: ${{ secrets.PODCHASER_API_KEY }}
        PODCHASER_API_SECRET: ${{ secrets.PODCHASER_API_SECRET }}
      run: |
        # Generates tiltcast-all.xml + tiltcast-1..N.xml and copies cover art
        # into output/. --no-dev skips the heavy whisper/CUDA dev group this
        # script doesn't need.
        uv run --no-dev build_list_feed.py

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./output
        publish_branch: gh-pages
        # Incremental update — merges with existing files so the cd SPILL feeds
        # (cdspill-enriched/youtube/spotify) on gh-pages are preserved untouched.
        keep_files: true
